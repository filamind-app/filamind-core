name: CI
on: [push, pull_request]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20' # matches the release workflow (npm publish + provenance)
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - run: npm run build
      - name: No external-project references (R1)
        run: bash scripts/check-no-external-refs.sh
