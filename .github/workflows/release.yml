name: Release

# Cut a release by bumping the version in package.json and pushing a matching tag:
#   npm version patch   # or minor/major — commits + creates the vX.Y.Z tag
#   git push --follow-tags
# Publishing to npm needs an NPM_TOKEN repo secret (Settings → Secrets and variables → Actions).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
